aid: meilisearch
name: Meilisearch
description: >-
  Meilisearch is an open source, lightning-fast search engine API that brings
  AI-powered hybrid search to sites and applications. It provides a RESTful API
  for indexing, searching, and managing documents, with SDKs available for all
  major languages and frameworks.
